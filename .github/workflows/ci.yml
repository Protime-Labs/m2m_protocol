name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  suite:
    name: prototype suite (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # No dependencies: the prototype and its whole suite are stdlib-only and offline.
      # run_all.py exits non-zero if any test suite fails or any demo crashes.
      - name: Run the AATA prototype suite (offline, no deps)
        working-directory: aata_prototype
        run: python run_all.py
